name: Weekly CI

on:
  schedule:
    - cron: '0 0 * * 2' # Tuesdays at 00:00 UTC

env:
  HUSKY: 0

permissions:
  contents: read # for checkout

jobs:
  weekly-ci:
    name: Weekly CI
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22.x, 24.x]
        webpack-version: ['5.61.0', latest]
        dev-server-version: [4, latest]
        css-loader-version: ['3.5.0', latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install specific dependency versions
        run: pnpm install webpack@${{ matrix.webpack-version }} webpack-dev-server@${{ matrix.dev-server-version }} css-loader@${{ matrix.css-loader-version }} --no-lockfile

      - name: Linting
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm coverage
